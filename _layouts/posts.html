---
layout: default
---

<div class="posts-page">
  <div class="posts-page__hero">
    <h1 class="posts-page__title">posts</h1>
  </div>

  <div class="posts-page__body">
    <aside class="posts-page__sidebar">
      <div class="sidebar__section">
        <div class="sidebar__label">categories</div>

        <!-- 알고리즘 -->
        <div class="sidebar__cat-group">
          <button class="sidebar__cat-btn js-cat-toggle" data-cat="알고리즘">
            <span>알고리즘</span>
            <span class="sidebar__cat-count">{% assign c = 0 %}{% for p in site.posts %}{% if p.categories[0] == '알고리즘' %}{% assign c = c | plus: 1 %}{% endif %}{% endfor %}{{ c }}</span>
          </button>
          <div class="sidebar__subcat-list js-subcat-list" id="subcat-알고리즘" style="display:none;">
            <button class="sidebar__subcat-btn js-subcat-btn" data-cat="알고리즘" data-subcat="기하">기하</button>
            <button class="sidebar__subcat-btn js-subcat-btn" data-cat="알고리즘" data-subcat="그래프">그래프</button>
            <button class="sidebar__subcat-btn js-subcat-btn" data-cat="알고리즘" data-subcat="DP">DP</button>
            <button class="sidebar__subcat-btn js-subcat-btn" data-cat="알고리즘" data-subcat="수학">수학</button>
            <button class="sidebar__subcat-btn js-subcat-btn" data-cat="알고리즘" data-subcat="문자열">문자열</button>
          </div>
        </div>

        <!-- 체스 -->
        <div class="sidebar__cat-group">
          <button class="sidebar__cat-btn js-cat-toggle" data-cat="체스">
            <span>체스</span>
            <span class="sidebar__cat-count">{% assign c = 0 %}{% for p in site.posts %}{% if p.categories[0] == '체스' %}{% assign c = c | plus: 1 %}{% endif %}{% endfor %}{{ c }}</span>
          </button>
          <div class="sidebar__subcat-list js-subcat-list" id="subcat-체스" style="display:none;">
            <button class="sidebar__subcat-btn js-subcat-btn" data-cat="체스" data-subcat="오프닝">오프닝</button>
            <button class="sidebar__subcat-btn js-subcat-btn" data-cat="체스" data-subcat="엔드게임">엔드게임</button>
            <button class="sidebar__subcat-btn js-subcat-btn" data-cat="체스" data-subcat="경기복기">경기복기</button>
          </div>
        </div>

        <!-- 컴퓨터공학 -->
        <div class="sidebar__cat-group">
          <button class="sidebar__cat-btn js-cat-toggle" data-cat="컴퓨터공학">
            <span>컴퓨터공학</span>
            <span class="sidebar__cat-count">{% assign c = 0 %}{% for p in site.posts %}{% if p.categories[0] == '컴퓨터공학' %}{% assign c = c | plus: 1 %}{% endif %}{% endfor %}{{ c }}</span>
          </button>
          <div class="sidebar__subcat-list js-subcat-list" id="subcat-컴퓨터공학" style="display:none;">
            <button class="sidebar__subcat-btn js-subcat-btn" data-cat="컴퓨터공학" data-subcat="시스템프로그래밍">시스템프로그래밍</button>
            <button class="sidebar__subcat-btn js-subcat-btn" data-cat="컴퓨터공학" data-subcat="고급프로그래밍">고급프로그래밍</button>
            <button class="sidebar__subcat-btn js-subcat-btn" data-cat="컴퓨터공학" data-subcat="C++">C++</button>
          </div>
        </div>
      </div>

      <div class="sidebar__section">
        <div class="sidebar__label">tags</div>
        <div class="sidebar__tags">
          {% assign all_tags = site.posts | map: "tags" | join: "," | split: "," | uniq | sort %}
          {% for tag in all_tags %}
            <a href="{{ '/tags/#' | append: tag | relative_url }}" class="sidebar__tag">#{{ tag }}</a>
          {% endfor %}
        </div>
      </div>
    </aside>

    <div class="posts-page__list" id="posts-list">
      {% for post in site.posts %}
        <div class="js-post-item"
          data-cat="{{ post.categories[0] }}"
          data-subcat="{{ post.categories[1] }}">
          {% include post-card.html post=post %}
        </div>
      {% endfor %}
    </div>
  </div>
</div>

<script>
  const catBtns = document.querySelectorAll('.js-cat-toggle');
  const subBtns = document.querySelectorAll('.js-subcat-btn');
  const items   = document.querySelectorAll('.js-post-item');
  let activeCat    = null;
  let activeSubcat = null;

  function filterPosts() {
    items.forEach(item => {
      const catMatch    = !activeCat    || item.dataset.cat    === activeCat;
      const subcatMatch = !activeSubcat || item.dataset.subcat === activeSubcat;
      item.style.display = (catMatch && subcatMatch) ? 'block' : 'none';
    });
  }

  catBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const cat     = btn.dataset.cat;
      const subList = document.getElementById('subcat-' + cat);

      if (activeCat === cat) {
        // 같은 대분류 다시 클릭 → 전체 해제
        activeCat = null;
        activeSubcat = null;
        btn.classList.remove('active');
        if (subList) subList.style.display = 'none';
      } else {
        catBtns.forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.js-subcat-list').forEach(l => l.style.display = 'none');
        subBtns.forEach(b => b.classList.remove('active'));
        activeCat = cat;
        activeSubcat = null;
        btn.classList.add('active');
        if (subList) subList.style.display = 'flex';
      }
      filterPosts();
    });
  });

  subBtns.forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const sub = btn.dataset.subcat;
      if (activeSubcat === sub) {
        activeSubcat = null;
        btn.classList.remove('active');
      } else {
        subBtns.forEach(b => b.classList.remove('active'));
        activeSubcat = sub;
        btn.classList.add('active');
      }
      filterPosts();
    });
  });
</script>
